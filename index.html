<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ping Tool</title>
    <style>
        /* Minimal plain-text styling */
        .clickable-command {
            font-family: monospace;
            font-size: 18px;
            cursor: pointer;
            color: #0000ee;
            text-decoration: underline;
            user-select: none;
        }
    </style>
</head>
<body>

    <span id="cmd-text" class="clickable-command" onclick="copyCommand()">ping</span>

    <script>
        const baseCommand = "ping ";

        async function copyCommand() {
            const textElement = document.getElementById('cmd-text');

            try {
                // Read actual contents of the user's clipboard
                const currentClipboard = await navigator.clipboard.readText();
                const cleanedInput = currentClipboard.trim();

                if (cleanedInput) {
                    // Create the full command and push it back to the clipboard
                    const fullCommand = baseCommand + cleanedInput;
                    await navigator.clipboard.writeText(fullCommand);

                    // Show the full generated command as visual feedback
                    textElement.textContent = fullCommand;
                    textElement.style.color = "green";
                    
                    // Reset back to just "ping" after 1.5 seconds
                    setTimeout(() => {
                        textElement.textContent = "ping";
                        textElement.style.color = "#0000ee";
                    }, 1500);
                } else {
                    alert("Your clipboard is empty! Copy something first.");
                }

            } catch (err) {
                console.error("Failed to read/write clipboard: ", err);
                alert("Clipboard access denied. Please allow clipboard permissions.");
            }
        }
    </script>

</body>
</html>
