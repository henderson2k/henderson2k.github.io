<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ping Clipboard Tool</title>
    <style>
        .clickable-command {
            font-family: monospace;
            font-size: 18px;
            cursor: pointer;
            color: #0000ee;
            text-decoration: underline;
            user-select: none;
        }
    </style>
</head>
<body>

    <span id="cmd-text" class="clickable-command" onclick="copyCommand()">ping CB -t</span>

    <script>
        // The pattern to look for and replace
        const placeholder = "CB";

        async function copyCommand() {
            const textElement = document.getElementById('cmd-text');
            const template = "ping CB -t";

            try {
                const currentClipboard = await navigator.clipboard.readText();
                const cleanedInput = currentClipboard.trim();

                if (cleanedInput) {
                    // Substitute 'CB' with the clipboard content
                    const fullCommand = template.replace(placeholder, cleanedInput);
                    await navigator.clipboard.writeText(fullCommand);

                    textElement.textContent = "Copied!";
                    textElement.style.color = "green";

                    setTimeout(() => {
                        textElement.textContent = template;
                        textElement.style.color = "#0000ee";
                    }, 1200);
                } else {
                    alert("Your clipboard is empty! Copy something first.");
                }

            } catch (err) {
                console.error("Failed to read/write clipboard: ", err);
                alert("Clipboard access denied. Please allow clipboard permissions.");
            }
        }
    </script>
</body>
</html>
