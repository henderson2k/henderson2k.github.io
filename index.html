<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ping Tool</title>
    <style>
        /* Styling the input to look like plain text */
        .ping-input {
            font-family: monospace;
            font-size: 18px;
            border: none;
            border-bottom: 1px solid #ccc;
            width: 250px;
            outline: none;
            color: #0000ee;
        }
        .ping-input:focus {
            border-bottom: 2px solid #0000ee;
        }
    </style>
</head>
<body>

    <input type="text" id="ping-input" class="ping-input" value="ping ">

    <button onclick="copyCommand()">Copy Command</button>

    <script>
        async function copyCommand() {
            const inputField = document.getElementById('ping-input');
            const fullCommand = inputField.value;

            try {
                // Write the current value of the input box to the clipboard
                await navigator.clipboard.writeText(fullCommand);

                // Visual feedback
                const originalColor = inputField.style.color;
                inputField.style.color = "green";
                inputField.value = "Copied!";
                
                setTimeout(() => {
                    inputField.value = fullCommand;
                    inputField.style.color = originalColor;
                }, 1500);

            } catch (err) {
                console.error("Failed to write to clipboard: ", err);
                alert("Clipboard access denied.");
            }
        }
    </script>

</body>
</html>
