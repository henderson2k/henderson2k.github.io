<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ping Clipboard Tool</title>
    <style>
        /* Just basic text styling, making the command look clickable */
        .clickable-command {
            font-family: monospace;
            font-size: 18px;
            cursor: pointer;
            color: #0000ee;
            text-decoration: underline;
            user-select: none;
        }
    </style>
</head>
<body>

    <span id="cmd-text" class="clickable-command" onclick="copyCommand()">ping clipboard</span>

    <script>
        const baseCommand = "ping ";

        async function copyCommand() {
            const textElement = document.getElementById('cmd-text');

            try {
                // Read actual contents of the user's clipboard
                const currentClipboard = await navigator.clipboard.readText();
                const cleanedInput = currentClipboard.trim();

                if (cleanedInput) {
                    // Create the full command and push it to clipboard
                    const fullCommand = baseCommand + cleanedInput;
                    await navigator.clipboard.writeText(fullCommand);

                    // Brief text update for feedback
                    textElement.textContent = "Copied!";
                    textElement.style.color = "green";
                    
                    // Reset back to "ping clipboard" after 1.2 seconds
                    setTimeout(() => {
                        textElement.textContent = "ping clipboard";
                        textElement.style.color = "#0000ee";
                    }, 1200);
                } else {
                    alert("Your clipboard is empty! Copy something first.");
                }

            } catch (err) {
                console.error("Failed to read/write clipboard: ", err);
                alert("Clipboard access denied. Please allow clipboard permissions.");
            }
        }
    </script>

</body>
</html>
